# ─────────────────────────────────────────────────────────────────────────────
# RAG HR Assistant — Docker Compose (on-prem, vLLM)
#
# 전제 조건:
#   - NVIDIA GPU + 드라이버 (backend·vllm이 GPU 사용)
#   - LLM 모델이 ~/.cache/huggingface/ 에 캐시되어 있으면 재다운로드 생략
#
# 사용법:  cp .env.example .env  →  값 채우기  →  docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── 백엔드 (FastAPI + RAG 엔진) ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rag-hr-assistant/backend:${APP_VERSION:-latest}
    container_name: rag-backend
    expose:
      - "8123"

    volumes:
      - ./data/databases:/app/databases
      - ./data/documents:/app/data/documents
      - ./data/parsed_cache:/app/data/parsed_cache
      - ./logs:/app/logs
      - temp_db:/app/databases/temp_db
      - ~/.cache/huggingface:/root/.cache/huggingface

    environment:
      # ── 제품 브랜딩 ──
      - COMPANY_NAME=${COMPANY_NAME:-ACME}
      - APP_NAME=${APP_NAME:-HR Assistant}
      # ── 파싱 / 검색 ──
      - LLAMA_CLOUD_API_KEY=${LLAMA_CLOUD_API_KEY}
      - SCAN_OCR_FALLBACK=${SCAN_OCR_FALLBACK:-1}
      - SCAN_CHAR_THRESHOLD=${SCAN_CHAR_THRESHOLD:-50}
      - PROJECT_RETRIEVER_CACHE_MAX=${PROJECT_RETRIEVER_CACHE_MAX:-30}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080/search}
      - DATA_ROOT=/app
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - VLLM_HOST=http://vllm:8000
      - TZ=${TZ:-Asia/Seoul}
      # ── 이메일 알림 (선택) ──
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - ALERT_EMAIL=${ALERT_EMAIL}
      # ── 인증 / 보안 ──
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - USER_PASSWORD=${USER_PASSWORD:-changeme}
      # ── 모델 ──
      - CHAT_MODEL=${CHAT_MODEL:-LGAI-EXAONE/EXAONE-3.5-7.8B-Instruct-AWQ}
      - AVAILABLE_MODELS=${AVAILABLE_MODELS:-LGAI-EXAONE/EXAONE-3.5-7.8B-Instruct-AWQ}

    extra_hosts:
      - "host.docker.internal:host-gateway"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8123/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── 프론트엔드 (Next.js Standalone) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_APP_NAME: ${APP_NAME:-HR Assistant}
        BACKEND_URL: http://backend:8123
    image: rag-hr-assistant/frontend:${APP_VERSION:-latest}
    container_name: rag-frontend
    expose:
      - "3000"

    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8123
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - NEXT_PUBLIC_APP_NAME=${APP_NAME:-HR Assistant}
      - TZ=${TZ:-Asia/Seoul}
      - HOSTNAME=0.0.0.0

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    restart: unless-stopped

  # ── vLLM (로컬 LLM — OpenAI 호환 API 서버) ──────────────────────────────────
  vllm:
    image: vllm/vllm-openai@sha256:a230095847e93bd4df9888b33dab956fa9504537b828a23657d2b26fed57b5c9
    container_name: rag-vllm
    runtime: nvidia
    expose:
      - "8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command: >
      --model ${CHAT_MODEL:-LGAI-EXAONE/EXAONE-3.5-7.8B-Instruct-AWQ}
      --quantization awq
      --gpu-memory-utilization 0.85
      --max-model-len 16384
      --dtype auto
      --trust-remote-code
    environment:
      - TZ=${TZ:-Asia/Seoul}
      - CUDA_VISIBLE_DEVICES=0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # ── Nginx 리버스 프록시 (단일 외부 진입점) ───────────────────────────────────
  proxy:
    image: nginx:1.29.8-alpine
    container_name: rag-proxy
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - TZ=${TZ:-Asia/Seoul}
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    restart: unless-stopped

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  temp_db:
    driver: local

# 웹 검색(선택)을 쓰려면 SearXNG 인스턴스를 띄우고 SEARXNG_URL을 지정하세요.
# 없으면 웹 폴백은 자동으로 비활성화됩니다(코어 동작에는 영향 없음).
