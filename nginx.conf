events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # 업로드 크기 상한 (정밀 분석용 대용량 문서 허용)
    client_max_body_size 500M;

    # 위젯 Rate Limiting: IP당 분당 60회, 초과 시 429
    limit_req_zone $binary_remote_addr zone=widget_limit:10m rate=60r/m;
    limit_req_status 429;

    server {
        listen 80;

        # ── [DNS 재해석] 도커 내장 DNS로 upstream 컨테이너 IP를 요청 시점에 재조회.
        #    변수($frontend/$backend)를 proxy_pass에 쓰면 컨테이너 재생성(force-recreate)으로
        #    IP가 바뀌어도 nginx reload 없이 자동 추종한다(stale IP 502 방지).
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $frontend "frontend";
        set $backend  "backend";

        # ── [위젯] IP 제한 없이 공개 제공 — 반드시 접근제어 앞에 위치 ──
        location = /widget.js {
            add_header Access-Control-Allow-Origin "*" always;
            proxy_pass http://$frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # test.html: 위젯 데모 페이지
        location = /test.html {
            proxy_pass http://$frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # /api/widget/: 게스트 토큰 발급 + 위젯 채팅 스트림(SSE)
        location ^~ /api/widget/ {
            limit_req zone=widget_limit burst=20 nodelay;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
            add_header Access-Control-Allow-Methods "GET,POST,OPTIONS" always;
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://$backend:8123;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # ── [접근 제어] 기본은 전체 허용. 사내망으로 제한하려면 아래 주석을 해제하고
        #    회사 대역을 지정하세요. (위젯 관련 location은 위에서 이미 공개 처리됨)
        # allow 10.0.0.0/8;
        # allow 127.0.0.1;
        # deny all;

        # 로그인 요청(api/auth)은 프론트엔드(쿠키 중계)로 강제 고정
        location ^~ /api/auth {
            proxy_pass http://$frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 그 외 모든 API(/api/...)는 백엔드로 직접 전송 (Next.js 바디 크기 제한 우회)
        location /api/ {
            proxy_pass http://$backend:8123;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 화면 렌더링 및 정적 파일은 프론트엔드로
        location / {
            proxy_pass http://$frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── [HTTPS 사용 시] 인증서를 마운트하고 아래 블록을 참고해 443 서버를 추가하세요.
    #    server { listen 443 ssl; http2 on;
    #      ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #      ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #      ... (위 location 블록 동일) ... }
}
